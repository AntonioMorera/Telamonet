services:
  # Frontend + Web Server
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: telamonet_web_prod
    restart: always
    ports:
      - "${PORT:-80}:80"  # Usa el puerto de Render
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - app-network

  # Backend (Laravel API)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod  # Asegúrate de tener este Dockerfile
    container_name: telamonet_backend_prod
    restart: always
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=telamonet
      - DB_USERNAME=telamo_user
      - DB_PASSWORD=telamo_pass
    networks:
      - app-network

  # Base de Datos
  db:
    image: mysql:8.0
    container_name: telamonet_db_prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-telamonet}
      MYSQL_USER: ${MYSQL_USER:-telamo_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-telamo_pass}
    volumes:
      - mysql_prod_data:/var/lib/mysql
    networks:
      - app-network

  # phpMyAdmin (cambiado de Adminer a phpMyAdmin)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: telamonet_phpmyadmin_prod
    restart: always
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: ${PMA_USER:-telamo_user}
      PMA_PASSWORD: ${PMA_PASSWORD:-telamo_pass}
      UPLOAD_LIMIT: 300M
    networks:
      - app-network
    depends_on:
      - db

networks:
  app-network:
    driver: bridge

volumes:
  mysql_prod_data: