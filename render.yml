services:
  # ========== SERVICIO ÚNICO: Laravel + Vue ==========
  - type: web
    name: telamonet-app
    env: docker
    dockerfilePath: ./backend/Dockerfile.prod
    dockerContext: .
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://telamonet-app.onrender.com
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: telamonet-db
      - key: DB_PORT
        value: 3306
      - key: DB_DATABASE
        value: telamonet
      - key: DB_USERNAME
        value: telamo_user
      - key: DB_PASSWORD
        fromService:
          name: telamonet-db
          type: web
          envVarKey: MYSQL_PASSWORD
    disk:
      name: laravel-storage
      mountPath: /var/www/html/storage
      sizeGB: 1

  # ========== BASE DE DATOS ==========
  - type: web
    name: telamonet-db
    env: docker
    dockerfilePath: ./Dockerfile.mysql
    dockerContext: .
    plan: free
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 1
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
      - key: MYSQL_DATABASE
        value: telamonet
      - key: MYSQL_USER
        value: telamo_user
      - key: MYSQL_PASSWORD
        generateValue: true

  # ========== PHPMYADMIN ==========
  - type: web
    name: telamonet-phpmyadmin
    env: docker
    repo: https://github.com/phpmyadmin/docker.git
    branch: master
    plan: free
    envVars:
      - key: PMA_HOST
        value: telamonet-db
      - key: PMA_PORT
        value: 3306
      - key: PMA_USER
        value: telamo_user
      - key: PMA_PASSWORD
        fromService:
          name: telamonet-db
          type: web
          envVarKey: MYSQL_PASSWORD
      - key: UPLOAD_LIMIT
        value: 300M
      - key: PMA_ARBITRARY
        value: "1"